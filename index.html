<!DOCTYPE html><html>
<head>
<title>For Ayush ❤️</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #b71c1c;
  color: white;
  text-align: center;
}

.container {
  margin-top: 60px;
}

.card {
  background: #d32f2f;
  padding: 20px;
  border-radius: 20px;
  width: 300px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.photo {
  width: 140px;
  height: 140px;
  border-radius: 15px;
  object-fit: cover;
  margin-bottom: 10px;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.key {
  background: white;
  color: #d32f2f;
  font-size: 20px;
  padding: 12px;
  border-radius: 50%;
  border: none;
}

.display {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 10px;
  letter-spacing: 6px;
  font-size: 18px;
}

.teddy {
  font-size: 30px;
}
</style></head><body><div class="container">
  <div class="card"><div class="teddy">🧸🎀</div>

<img class="photo" src="https://i.pinimg.com/564x/3c/9f/0d/3c9f0d6e1b8c0e7c2c52c0c5e2c8c4b7.jpg">

<h2>Enter Passcode 💌</h2>
<p>Hint: 18 Oct 2025 💕</p>

<div class="display" id="display">--------</div>

<div class="keypad">
  <button class="key" onclick="press(1)">1</button>
  <button class="key" onclick="press(2)">2</button>
  <button class="key" onclick="press(3)">3</button>
  <button class="key" onclick="press(4)">4</button>
  <button class="key" onclick="press(5)">5</button>
  <button class="key" onclick="press(6)">6</button>
  <button class="key" onclick="press(7)">7</button>
  <button class="key" onclick="press(8)">8</button>
  <button class="key" onclick="press(9)">9</button>
  <button class="key" onclick="clearPass()">❌</button>
  <button class="key" onclick="press(0)">0</button>
  <button class="key" onclick="check()">✔</button>
</div>

<p id="msg"></p>

  </div>
</div><script>
let pass = "";

function press(num){
  if(pass.length < 8){
    pass += num;
    updateDisplay();
  }
}

function updateDisplay(){
  document.getElementById("display").innerText = pass.padEnd(8, "-");
}

function clearPass(){
  pass = "";
  updateDisplay();
}

function check(){
  if(pass === "18102025"){

    document.body.innerHTML = `
    <div style="text-align:center; padding:20px; background:#b71c1c; color:white; min-height:100vh;">
      <h1>Happy Birthday Ayush 🎂❤️</h1>
      <p>To my favorite person 💕</p>
      <p>You make my life so beautiful 🥹</p>
      <p>I love you always 💖</p>
    </div>
    `;

  } else {
    document.getElementById("msg").innerText = "Wrong code 😜";
    clearPass();
  }
}
</script></body>
</html>
