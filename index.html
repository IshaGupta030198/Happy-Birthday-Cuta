<!DOCTYPE html><html>
<head>
  <title>For Ayush ❤️</title>  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3e6ff;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      width: 300px;
      margin: 80px auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .display {
      background: #eee;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      letter-spacing: 5px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
    }

    button {
      padding: 12px;
      border-radius: 50%;
      border: none;
      background: #ddd;
      font-size: 18px;
    }
  </style></head><body><div class="card">  <h2>Enter Passcode 💌</h2>
  <p>Hint: first date 💕</p>  <div id="display" class="display">--------</div>  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="clearPass()">❌</button>
    <button onclick="press(0)">0</button>
    <button onclick="check()">✔</button>
  </div>  <p id="msg"></p></div><script>

let pass = "";

function press(n){
  if(pass.length < 8){
    pass += n;
    update();
  }
}

function update(){
  document.getElementById("display").innerText = pass.padEnd(8,"-");
}

function clearPass(){
  pass = "";
  update();
}

function check(){
  if(pass === "21072025"){
    document.body.innerHTML = "<h1>Happy Birthday Ayush 🎂❤️</h1><p>I love you 💖</p>";
  } else {
    document.getElementById("msg").innerText = "Wrong code 😜";
    clearPass();
  }
}

</script></body>
</html>
