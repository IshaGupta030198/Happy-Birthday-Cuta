<!DOCTYPE html><html>
<head>
<title>For Ayush ❤️</title><style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(135deg, #f3e6ff, #e1bee7);
}

/* 💜 Card Center */
.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 300px;

  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  box-shadow: 0 0 25px rgba(186, 104, 200, 0.5);
}

/* Display */
.display {
  background: #eee;
  padding: 10px;
  border-radius: 10px;
  margin: 10px 0;
  letter-spacing: 5px;
}

/* Keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

button {
  padding: 12px;
  border-radius: 50%;
  border: none;
  background: #ddd;
  font-size: 18px;
}

/* ❤️ Floating hearts */
@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100vh); }
}
</style></head><body><div class="card">
  <h2>Enter Passcode 💌</h2>
  <p>Hint: first date 💕</p>  <div id="display" class="display">--------</div>  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="clearPass()">❌</button>
    <button onclick="press(0)">0</button>
    <button onclick="check()">✔</button>
  </div>  <p id="msg"></p>
</div><script>

let pass = "";

/* ❤️ Floating hearts on first page */
for(let i=0; i<15; i++){
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.style.position = "fixed";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.top = Math.random()*100 + "vh";
  heart.style.fontSize = (15 + Math.random()*20) + "px";
  heart.style.opacity = 0.6;
  heart.style.animation = "float 6s linear infinite";
  document.body.appendChild(heart);
}

function press(n){
  if(pass.length < 8){
    pass += n;
    update();
  }
}

function update(){
  document.getElementById("display").innerText = pass.padEnd(8,"-");
}

function clearPass(){
  pass = "";
  update();
}

function playMusic(){
  let music = document.getElementById("bgmusic");
  music.play();
}

function check(){

if(pass === "21072025"){

document.body.innerHTML = `
<div style="text-align:center; padding:30px; background:linear-gradient(135deg,#f3e6ff,#e1bee7); min-height:100vh;">

<h1 style="color:#6a1b9a;">Happy Birthday Ayush 🎂❤️</h1>

<p style="color:#6a1b9a;">You are my favorite person 💕</p>
<p style="color:#6a1b9a;">You make my life so beautiful 🥹</p>
<p style="color:#6a1b9a;">I love you always 💖</p>

<!-- 🎂 Cake -->
<div class="cake">
  <div class="layer"></div>
  <div class="icing"></div>
  <div class="candle"><div class="flame"></div></div>
</div>

<!-- 🎵 Button (important for mobile) -->
<button onclick="playMusic()" 
style="padding:10px 20px; border:none; border-radius:10px; background:#6a1b9a; color:white;">
▶ Play Music 💖
</button>

<audio id="bgmusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

</div>

<style>
.cake {
  position: relative;
  width: 150px;
  margin: 40px auto;
}
.layer {
  height: 80px;
  background: #ff8a80;
  border-radius: 10px;
}
.icing {
  height: 20px;
  background: #ff5252;
  border-radius: 10px 10px 0 0;
}
.candle {
  width: 10px;
  height: 30px;
  background: white;
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
}
.flame {
  width: 10px;
  height: 10px;
  background: gold;
  border-radius: 50%;
  animation: flicker 0.5s infinite alternate;
}
@keyframes flicker {
  from { opacity: 1; }
  to { opacity: 0.4; }
}
</style>`;

} else {
document.getElementById("msg").innerText = "Wrong code 😜";
clearPass();
}
}

</script></body>
</html>
