<!DOCTYPE html><html>
<head>
<title>For Ayush ❤️</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #b71c1c;
  color: white;
  text-align: center;
}

.container {
  margin-top: 60px;
}

.card {
  background: #d32f2f;
  padding: 20px;
  border-radius: 20px;
  width: 300px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.photo {
  width: 120px;
  height: 120px;
  border-radius: 10px;
  object-fit: cover;
  margin-bottom: 10px;
}

h2 {
  margin: 10px 0;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.key {
  background: white;
  color: #d32f2f;
  font-size: 20px;
  padding: 12px;
  border-radius: 50%;
  border: none;
}

.display {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 10px;
  letter-spacing: 10px;
  font-size: 20px;
}

.teddy {
  font-size: 30px;
}

</style></head><body><div class="container">
  <div class="card"><div class="teddy">🧸🎀</div>

<img class="photo" src="https://photos.app.goo.gl/362deeQJNhJRUbNd9">

<h2>Enter Passcode 💌</h2>
<p>Hint: our First date 💕</p>

<div class="display" id="display">----</div>

<div class="keypad">
  <button class="key" onclick="press(1)">1</button>
  <button class="key" onclick="press(2)">2</button>
  <button class="key" onclick="press(3)">3</button>
  <button class="key" onclick="press(4)">4</button>
  <button class="key" onclick="press(5)">5</button>
  <button class="key" onclick="press(6)">6</button>
  <button class="key" onclick="press(7)">7</button>
  <button class="key" onclick="press(8)">8</button>
  <button class="key" onclick="press(9)">9</button>
  <button class="key" onclick="clearPass()">❌</button>
  <button class="key" onclick="press(0)">0</button>
  <button class="key" onclick="check()">✔</button>
</div>

<p id="msg"></p>

  </div>
</div><script>

let pass = "";

function press(num){
  if(pass.length < 4){
    pass += num;
    updateDisplay();
  }
}

function updateDisplay(){
  let display = pass.padEnd(4, "-");
  document.getElementById("display").innerText = display;
}

function clearPass(){
  pass = "";
  updateDisplay();
}

function check(){
  if(pass == "21072025"){   // 🔐 CHANGE THIS CODE
    document.body.innerHTML = `
      <h1>Happy Birthday Ayush 🎂❤️</h1>

<p>To my favorite person, my safe place, and my biggest smile 💕</p>

<p>I don’t know how you do it, but you make even the simplest days feel so special 🥹✨</p>

<p>Being with you feels easy, comfortable, and full of happiness… like I found my home in a person 🤍</p>

<p>Thank you for being you — for your care, your love, and all the little things you do that mean so much to me 💖</p>

<p>I’m really lucky to have you in my life… and I hope I can keep making you as happy as you make me 😄</p>

<p>Once again, Happy Birthday my cutu 🧸❤️</p>

<p>I love you… always 💌</p>
<div class="cake">
      <div class="candle"></div>
    </div>

  </div>

  <style>
    .cake {
      width: 120px;
      height: 80px;
      background: #ff8a80;
      margin: 40px auto;
      border-radius: 10px;
      position: relative;
    }

    .candle {
      width: 10px;
      height: 30px;
      background: white;
      position: absolute;
      top: -30px;
      left: 55px;
    }

    .candle::after {
      content: '';
      width: 10px;
      height: 10px;
      background: yellow;
      border-radius: 50%;

      left: 0;

    }

    @keyframes flicker {
      from { opacity: 1; }
      to { opacity: 0.4; }
    }
  </style>
    `;
  // play music
  let music = document.getElementById("bgmusic");
  if(music){
    music.play();
  }
    
  } else {
    document.getElementById("msg").innerText = "Wrong code 😜";
    clearPass();
  }
}

  <audio id="bgmusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>
</script></body>
</html>
